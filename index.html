<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wisetasks | Конструктор задач</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1>Wisetasks <span style="font-weight: 400; color: #888;">Education</span></h1>
        <div class="toolbar">
            <select id="generator-select" class="btn" style="background-color: #2c3e50; border: 1px solid #4a627a; font-family: inherit; font-size: 14px; padding: 10px;">
                <option value="cards">Генератор "Карты"</option>
                <option value="word">Генератор "Работа со словами"</option>
                <option value="numbers">Генератор "Работа с числами"</option>
                <option value="equation">Генератор "Работа с уравнениями"</option>
                <option value="basket">Генератор "Шары и Урны"</option>
                <option value="digits">Генератор "Делимости / Остатки"</option>
                <option value="chess">Генератор "Шахматы"</option>
            </select>
        </div>
    </header>
    
    <div class="main-container" style="display: flex; flex-direction: column; flex: 1; overflow: hidden;">
        <div id="properties-panel" class="workspace">
            <p style="text-align: center; color: #888; margin-top: 50px;">Загрузка модуля...</p>
        </div>
        
        <footer class="footer">
            Разработано студентами факультета компьютерной безопасности<br>
            Санкт-Петербургского государственного электротехнического университета «ЛЭТИ» им. В.И. Ульянова (Ленина)
        </footer>
    </div>
    
    <script type="module" src="main.js"></script>
</body>
</html>
