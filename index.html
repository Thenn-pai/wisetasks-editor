<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wisetasks Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1>Wisetasks Web Editor</h1>
        <div class="toolbar">
            <select id="generator-select" class="btn" style="background-color: #333; border: 1px solid #555; margin-right: 15px; font-family: inherit;">
                <option value="base">Основной редактор задач</option>
                <option value="cards">Генератор "Карты"</option>
                <option value="word">Генератор "Работа со словами"</option>
                <option value="numbers">Генератор "Работа с числами"</option>
                <option value="equation">Генератор "Работа с уравнениями"</option>
                <option value="basket">Генератор "Шары и Урны"</option>
                <option value="digits">Генератор "Делимости / Остатки"</option>
                <option value="chess">Генератор "Шахматы"</option>
            </select>

            <button id="btn-add-function" class="btn">Добавить функцию</button>
            <button id="btn-add-set" class="btn">Добавить множество</button>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <h3>Дерево задачи</h3>
            <div id="tree-container">
                <ul id="task-tree"></ul>
            </div>
        </aside>

        <main class="workspace">
            <h3>Свойства элемента</h3>
            <div id="properties-panel">
                <p class="placeholder-text">Выберите элемент в дереве для редактирования</p>
            </div>
        </main>
    </div>

    <footer class="xml-output">
        <h3>Сгенерированный XML</h3>
        <textarea id="xml-editor" readonly placeholder="Здесь появится XML код..."></textarea>
    </footer>

    <script type="module" src="main.js"></script>
</body>
</html>
